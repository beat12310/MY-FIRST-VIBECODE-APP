name: CI

# Merge-blocking quality gate: a change is rejected until the entire permanent
# regression suite passes and the codebase typechecks cleanly. This is the
# server-side enforcement of the same "verify" script the local pre-commit
# hook (.husky/pre-commit) already runs — CI is authoritative since a local
# hook can be bypassed with --no-verify, this cannot.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm' intentionally removed — a stale cache keyed to a
          # PRIOR package-lock.json (before this session's regeneration) is
          # one candidate explanation for an "Invalid Version" failure that
          # reproduces deterministically in this exact CI environment but
          # not locally; removing the cache rules it out (or fixes it) with
          # a one-line change, before falling back to deeper forensics.
      - run: node --version && npm --version
      # npm ci (not npm install) fails on this dependency tree: @aws-amplify/
      # backend's CDK-adjacent packages pull in multiple duplicated,
      # differently-versioned copies of @opentelemetry/* and uuid (some via
      # exact-pinned sub-dependency requirements), which npm install resolves
      # fine via its normal hoisting/dedup semantics but npm ci's stricter
      # byte-exact lockfile validation rejects as "missing" — confirmed live,
      # reproducible even immediately after a from-scratch npm install
      # regenerated a fresh, valid lock file. npm install still installs
      # deterministically FROM the committed lock file (this isn't a live
      # re-resolution loophole) — it just tolerates this specific tree's
      # legitimate version-range flexibility instead of npm ci's stricter check.
      - run: npm install
      - name: Dump npm debug log on failure (diagnostic)
        if: failure()
        run: cat /home/runner/.npm/_logs/*-debug-0.log || true
      - name: Typecheck
        run: npm run typecheck
      - name: Regression suite
        run: npm test
      - name: Platform dependency check
        run: npm run check-deps
