name: OIDC Smoke Test

# Cheap, fast confirmation that GitHub Actions can assume
# infra/lib/github-oidc-stack.ts's role via OIDC (no long-lived keys) and
# that the assumed identity has exactly the Bedrock-invoke-only permissions
# it's supposed to — WITHOUT running a real Bedrock build (that's what
# scheduled-verification.yml's real-ai-verification/golden-project-suite
# jobs do, and they're expensive/slow). This workflow only asks "does the
# trust policy work, and are the permissions what we designed."
on:
  workflow_dispatch:

jobs:
  verify-role-assumption:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Confirm assumed identity
        run: aws sts get-caller-identity
      - name: Confirm the granted bedrock:InvokeModel permission actually works (minimal 1-token call)
        run: |
          aws bedrock-runtime invoke-model \
            --model-id anthropic.claude-haiku-4-5-20251001-v1:0 \
            --body '{"anthropic_version":"bedrock-2023-05-31","max_tokens":1,"messages":[{"role":"user","content":"hi"}]}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/bedrock-response.json
          cat /tmp/bedrock-response.json
      - name: Confirm the explicit denies actually hold (this MUST fail with AccessDenied)
        run: |
          if aws dynamodb list-tables 2>/tmp/denied.txt; then
            echo "✗ dynamodb:ListTables succeeded — the deny policy is NOT working as intended"
            exit 1
          fi
          grep -qi "AccessDenied\|not authorized" /tmp/denied.txt && echo "✓ dynamodb access correctly denied" || (cat /tmp/denied.txt && exit 1)
