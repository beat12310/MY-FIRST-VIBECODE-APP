version: 1
# npm ci (not npm install) fails in this build environment: this session
# added vitest/husky/zod to package.json, and vitest's transitive vite
# dependency pulls in a nested esbuild version that npm ci's strict
# byte-exact lockfile validation rejects here (and in GitHub Actions'
# runner) even though the SAME lock file installs cleanly with npm ci on a
# local Mac — confirmed live: this exact "Missing: esbuild@0.28.1 from lock
# file" error on Amplify's CodeBuild-based build environment, root-caused
# and already fixed the same way for .github/workflows/ci.yml and
# scheduled-verification.yml. npm install still installs deterministically
# from the committed lock file; it's just tolerant of this specific
# dependency tree's cross-environment resolution difference where npm ci
# is not.
#
# --include=dev is required on BOTH installs below. Root cause, confirmed
# with a live diagnostic dump (job #25): NODE_ENV=production is set as an
# app-level environment variable here, and plain `npm install` (unlike
# `npm ci`, which is what originally ran for months without this problem)
# respects that by silently skipping ALL devDependencies — no error, just
# a much smaller "audited 618 packages" install. That's exactly why husky
# was "missing" earlier (masked with `|| exit 0`, itself still correct —
# git hooks are meaningless in a build container) and why
# @aws-amplify/backend-cli's `ampx` binary was never installed at all,
# which IS fatal since the backend phase's whole job is to run it.
backend:
  phases:
    build:
      commands:
        - npm install --include=dev
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm install --include=dev
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
